name: Playwright Main Tests with Allure

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  main:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        type: [unauthorized, authorized, unregistered]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.18.0

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npm run test:main:${{ matrix.type }} \
            --reporter=list,allure-playwright \
            --retries=2
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.type }}
          path: allure-results

  deploy:
    needs: main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout gh-pages (for history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge Allure results
        run: |
          mkdir merged-results
          cp -r allure-*/* merged-results/ || true

      - name: Restore Allure history
        run: |
          mkdir -p merged-results/history
          cp -r gh-pages/history/* merged-results/history/ || true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: |
          allure generate merged-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true


